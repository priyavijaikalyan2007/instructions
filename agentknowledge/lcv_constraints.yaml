# Linguistic Constraint Verification (LCV) Ruleset — Example
# This file defines quasi-natural language constraints for code verification.
# Customize the namespaces, methods, and rules to match your project structure.
# See LCV_DESIGN.md for the full specification.

constraints:
  - id: "LCV-001"
    description: "Every mutating API call must enforce authorization."
    quasi_nl: "In '{YourApp}.Web.Controllers', every 'Method' that updates an entity MUST call 'AuthorizationService.CheckPermission' before the operation."
    target:
      namespace: "{YourApp}.Web.Controllers"
      methods: ["Post*", "Put*", "Patch*", "Delete*"]
    rules:
      - required_call: "AuthorizationService.CheckPermission"
      - argument_check: "CheckPermission(entityId, permission)"
    severity: "Critical"
    enforcement: "ArchUnit / Roslyn"

  - id: "LCV-002"
    description: "Every conditional branch must have a log statement."
    quasi_nl: "In '{YourApp}.Core.Services', every conditional branch (if, else, switch case) MUST contain at least one call to 'ILogger.Log*'."
    target:
      namespace: "{YourApp}.Core.Services"
      blocks: ["if", "else", "case"]
    rules:
      - child_call_required: "ILogger.Log"
    severity: "High"
    enforcement: "Roslyn Analyzer"

  - id: "LCV-003"
    description: "No nullable types in service signatures; use Optional<T> instead."
    quasi_nl: "In '{YourApp}.Core.Services', no 'Method' parameter or return type can be a nullable type (e.g., T?). Use 'Optional<T>' for potentially missing values."
    target:
      namespace: "{YourApp}.Core.Services"
    rules:
      - forbidden_type_suffix: "?"
      - allowed_null_wrapper: "Optional<*>"
    severity: "High"
    enforcement: "ArchUnit"

  - id: "LCV-004"
    description: "No API endpoint is open by default (Default Deny)."
    quasi_nl: "Every 'Class' in '{YourApp}.Web.Controllers' MUST have the 'Authorize' attribute. 'AllowAnonymous' is FORBIDDEN without an ADR (Architectural Decision Record) reference."
    target:
      namespace: "{YourApp}.Web.Controllers"
      type: "Class"
    rules:
      - attribute_required: "Authorize"
      - attribute_forbidden: "AllowAnonymous"
    severity: "Critical"
    enforcement: "ArchUnit"

  - id: "LCV-005"
    description: "No authorization action fails open (Explicit Failure)."
    quasi_nl: "In '{YourApp}.Core.Services', every 'Try-Catch' block handling authorization MUST set the 'Result' to 'Failure' in the 'Catch' block and MUST NOT return a 'Success' state."
    target:
      namespace: "{YourApp}.Core.Services"
      blocks: ["catch"]
    rules:
      - forbidden_pattern: "return Result.Success"
      - required_pattern: "return Result.Failure"
    severity: "Critical"
    enforcement: "Roslyn Analyzer"

  - id: "LCV-006"
    description: "All database calls must be parameterized (SQL injection prevention)."
    quasi_nl: "In '{YourApp}.Data', any call to 'FromSqlRaw' MUST NOT use string interpolation and MUST use parameter placeholders."
    target:
      namespace: "{YourApp}.Data"
    rules:
      - forbidden_syntax: "FromSqlRaw($\"...\")"
      - required_syntax: "FromSqlRaw(\"...\", ...)"
    severity: "Critical"
    enforcement: "Roslyn Analyzer"

  - id: "LCV-007"
    description: "No raw string interpolation in AI prompts (Prompt Injection Defense)."
    quasi_nl: "In '{YourApp}.AI' or any 'AiService', string interpolation ($'{...}') MUST NOT be used to embed variables named 'user*', 'input', or 'request' into variables named 'prompt' or passed to 'GenerateTextAsync'."
    target:
      namespace: "{YourApp}.AI"
      methods: ["GenerateTextAsync", "BuildPrompt"]
    rules:
      - forbidden_pattern: "$\".*{userInput}.*\""
      - required_pattern: "<user_input>{userInput}</user_input>"
    severity: "Critical"
    enforcement: "Roslyn Analyzer"

  - id: "LCV-008"
    description: "Strict schema validation for AI JSON outputs."
    quasi_nl: "Whenever 'JsonSerializer.Deserialize' is called on a variable derived from an AI response, it MUST be passed a 'JsonSerializerOptions' parameter configured with 'UnmappedMemberHandling.Disallow'."
    target:
      namespace: "{YourApp}.AI"
    rules:
      - required_argument: "JsonSerializerOptions"
      - required_property_assignment: "UnmappedMemberHandling = JsonUnmappedMemberHandling.Disallow"
    severity: "High"
    enforcement: "Roslyn Analyzer"
